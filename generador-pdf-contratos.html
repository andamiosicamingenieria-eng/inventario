<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de PDF de Contratos</title>
    <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .form-section {
            margin-bottom: 30px;
        }
        
        .form-section h2 {
            font-size: 16px;
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .form-grid.full {
            grid-template-columns: 1fr;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        input, select, textarea {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        
        .items-section {
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .items-section h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 15px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            font-size: 12px;
        }
        
        table thead {
            background: #667eea;
            color: white;
        }
        
        table th {
            padding: 10px;
            text-align: left;
            font-weight: 600;
        }
        
        table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        
        table td input {
            width: 100%;
            margin: 0;
            padding: 5px;
            font-size: 12px;
        }
        
        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #dee2e6;
        }
        
        .btn-danger {
            background: #ff6b6b;
            color: white;
            padding: 5px 15px;
            font-size: 11px;
        }
        
        .btn-danger:hover {
            background: #ff5252;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            margin-top: 30px;
        }
        
        .preview {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .preview h4 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Generador de PDF de Contratos</h1>
            <p>ICAM 360 - Sistema de Gestión de Andamios</p>
        </div>
        
        <div class="content">
            <div class="success" id="successMsg">✓ Formulario completado correctamente</div>
            
            <form id="contractForm">
                <!-- SECCIÓN 1: CONTRATO BÁSICO -->
                <div class="form-section">
                    <h2>📋 Datos del Contrato</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Folio</label>
                            <input type="text" id="folio" placeholder="20001" required>
                        </div>
                        <div class="form-group">
                            <label>Tipo de Operación</label>
                            <select id="tipoOperacion" required>
                                <option value="">Selecciona...</option>
                                <option value="Nuevo">Nuevo</option>
                                <option value="Renovación">Renovación</option>
                                <option value="Extensión">Extensión</option>
                                <option value="Corrección">Corrección</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Fecha del Contrato</label>
                            <input type="date" id="fechaContrato" required>
                        </div>
                        <div class="form-group">
                            <label>Agente de Ventas</label>
                            <input type="text" id="vendedor" placeholder="Nombre del agente">
                        </div>
                    </div>
                </div>
                
                <!-- SECCIÓN 2: CLIENTE -->
                <div class="form-section">
                    <h2>👥 Sección Cliente</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Razón Social</label>
                            <input type="text" id="razonSocial" placeholder="Nombre de la empresa" required>
                        </div>
                        <div class="form-group">
                            <label>RFC</label>
                            <input type="text" id="rfc" placeholder="ABC123456XYZ" maxlength="13">
                        </div>
                        <div class="form-group">
                            <label>Teléfono</label>
                            <input type="tel" id="telefonoCliente" placeholder="+52 81 1234 5678">
                        </div>
                        <div class="form-group">
                            <label>Dirección</label>
                            <textarea id="direccionCliente" placeholder="Dirección completa del cliente"></textarea>
                        </div>
                    </div>
                </div>
                
                <!-- SECCIÓN 3: ENTREGA -->
                <div class="form-section">
                    <h2>📍 Sección Entrega</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Contacto que Recibe</label>
                            <input type="text" id="contactoEntrega" placeholder="Nombre del contacto" required>
                        </div>
                        <div class="form-group">
                            <label>Teléfono del Contacto</label>
                            <input type="tel" id="telefonoContacto" placeholder="+52 81 1234 5678">
                        </div>
                        <div class="form-group full">
                            <label>Dirección de Entrega/Obra</label>
                            <textarea id="direccionEntrega" placeholder="Dirección específica de entrega" required></textarea>
                        </div>
                    </div>
                </div>
                
                <!-- SECCIÓN 4: PAGO -->
                <div class="form-section">
                    <h2>💰 Sección Pago</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Fecha de Pago</label>
                            <input type="date" id="fechaPago" required>
                        </div>
                        <div class="form-group">
                            <label>Forma de Pago</label>
                            <select id="formaPago" required>
                                <option value="">Selecciona...</option>
                                <option value="Efectivo">💵 Efectivo</option>
                                <option value="Transferencia Bancaria">💳 Transferencia Bancaria</option>
                                <option value="Tarjeta de Crédito/Débito">🏧 Tarjeta de Crédito/Débito</option>
                                <option value="Cheque">📄 Cheque</option>
                                <option value="Crédito">📋 Crédito</option>
                                <option value="Otro">⚙ Otro</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Monto Total ($)</label>
                            <input type="number" id="montoTotal" step="0.01" placeholder="0.00" required>
                        </div>
                        <div class="form-group">
                            <label>Anticipo ($)</label>
                            <input type="number" id="anticipo" step="0.01" placeholder="0.00">
                        </div>
                    </div>
                </div>
                
                <!-- SECCIÓN 5: ÍTEMS -->
                <div class="items-section">
                    <h3>📦 Ítems del Contrato</h3>
                    <table id="itemsTable">
                        <thead>
                            <tr>
                                <th style="width:10%">Cantidad</th>
                                <th style="width:15%">Código</th>
                                <th style="width:35%">Descripción</th>
                                <th style="width:15%">Precio/Día</th>
                                <th style="width:15%">Importe</th>
                                <th style="width:10%">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="itemsBody">
                        </tbody>
                    </table>
                    <div class="btn-row">
                        <button type="button" class="btn-secondary" onclick="agregarItem()">+ Agregar Item</button>
                    </div>
                </div>
                
                <!-- SECCIÓN 6: NOTAS -->
                <div class="form-section">
                    <h2>📝 Notas Adicionales</h2>
                    <div class="form-grid full">
                        <div class="form-group">
                            <label>Notas</label>
                            <textarea id="notas" placeholder="Notas adicionales del contrato"></textarea>
                        </div>
                    </div>
                </div>
                
                <!-- ACCIONES -->
                <div class="actions">
                    <button type="button" class="btn-secondary" onclick="limpiarForm()">🗑 Limpiar</button>
                    <button type="button" class="btn-primary" onclick="generarPDF()">📥 Descargar PDF</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // Establecer fecha actual por defecto
        document.getElementById('fechaContrato').valueAsDate = new Date();
        document.getElementById('fechaPago').valueAsDate = new Date();
        
        let itemCount = 0;
        
        // Agregar item
        function agregarItem() {
            const tbody = document.getElementById('itemsBody');
            itemCount++;
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="number" class="cant" value="1" min="1" onchange="calcularItem(this)"></td>
                <td><input type="text" class="codigo" placeholder="AND-001"></td>
                <td><input type="text" class="nombre" placeholder="Descripción del producto"></td>
                <td><input type="number" class="precio" step="0.01" value="0" onchange="calcularItem(this)"></td>
                <td class="importe">$0.00</td>
                <td><button type="button" class="btn-danger" onclick="this.parentElement.parentElement.remove()">✕</button></td>
            `;
            tbody.appendChild(row);
        }
        
        // Calcular importe del item
        function calcularItem(input) {
            const row = input.parentElement.parentElement;
            const cant = parseFloat(row.querySelector('.cant').value) || 0;
            const precio = parseFloat(row.querySelector('.precio').value) || 0;
            const importe = cant * precio;
            row.querySelector('.importe').textContent = '$' + importe.toLocaleString('es-MX', {minimumFractionDigits:2});
        }
        
        // Limpiar formulario
        function limpiarForm() {
            document.getElementById('contractForm').reset();
            document.getElementById('itemsBody').innerHTML = '';
            document.getElementById('fechaContrato').valueAsDate = new Date();
            document.getElementById('fechaPago').valueAsDate = new Date();
            itemCount = 0;
        }
        
        // Agregar un item por defecto
        agregarItem();
        
        // Generar PDF
        async function generarPDF() {
            try {
                const datos = recopilarDatos();
                
                if (!datos.folio || !datos.razonSocial || !datos.contactoEntrega || !datos.direccionEntrega) {
                    alert('❌ Por favor completa todos los campos requeridos');
                    return;
                }
                
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                let yPos = 20;
                const lineHeight = 7;
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                const margin = 15;
                const contentWidth = pageWidth - 2 * margin;
                
                // Colores
                const colorPrimary = [102, 126, 234];
                const colorText = [51, 51, 51];
                const colorGray = [100, 100, 100];
                
                // ===== ENCABEZADO =====
                doc.setFillColor(...colorPrimary);
                doc.rect(0, 0, pageWidth, 30, 'F');
                
                doc.setTextColor(255, 255, 255);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(16);
                doc.text(`CONTRATO ${datos.tipoOperacion.toUpperCase()}`, margin, 15);
                
                doc.setFontSize(11);
                doc.text(`Folio: ${datos.folio}`, pageWidth - margin - 40, 15);
                
                doc.setFontSize(9);
                doc.text(`Fecha: ${formatearFecha(datos.fechaContrato)}`, pageWidth - margin - 40, 22);
                
                yPos = 35;
                
                // Línea separadora
                doc.setDrawColor(...colorPrimary);
                doc.line(margin, yPos, pageWidth - margin, yPos);
                yPos += 5;
                
                // ===== SECCIÓN CLIENTE =====
                doc.setTextColor(...colorPrimary);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(10);
                doc.text('SECCIÓN CLIENTE', margin, yPos);
                yPos += 7;
                
                doc.setTextColor(...colorText);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                
                doc.setFont('helvetica', 'bold');
                doc.text('Razón Social:', margin, yPos);
                doc.setFont('helvetica', 'normal');
                doc.text(datos.razonSocial, margin + 40, yPos);
                yPos += 6;
                
                doc.setFont('helvetica', 'bold');
                doc.text('RFC:', margin, yPos);
                doc.setFont('helvetica', 'normal');
                doc.text(datos.rfc || '—', margin + 40, yPos);
                doc.text('Teléfono:', margin + 90, yPos);
                doc.text(datos.telefonoCliente || '—', margin + 130, yPos);
                yPos += 6;
                
                doc.setFont('helvetica', 'bold');
                doc.text('Dirección:', margin, yPos);
                doc.setFont('helvetica', 'normal');
                const dirClienteLines = doc.splitTextToSize(datos.direccionCliente || '—', contentWidth - 30);
                doc.text(dirClienteLines, margin + 40, yPos);
                yPos += dirClienteLines.length * 4 + 5;
                
                // Línea separadora
                doc.line(margin, yPos, pageWidth - margin, yPos);
                yPos += 5;
                
                // ===== SECCIÓN ENTREGA =====
                doc.setTextColor(...colorPrimary);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(10);
                doc.text('SECCIÓN ENTREGA', margin, yPos);
                yPos += 7;
                
                doc.setTextColor(...colorText);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                
                doc.setFont('helvetica', 'bold');
                doc.text('Contacto que Recibe:', margin, yPos);
                doc.setFont('helvetica', 'normal');
                doc.text(datos.contactoEntrega, margin + 50, yPos);
                yPos += 6;
                
                doc.setFont('helvetica', 'bold');
                doc.text('Teléfono:', margin, yPos);
                doc.setFont('helvetica', 'normal');
                doc.text(datos.telefonoContacto || '—', margin + 50, yPos);
                yPos += 6;
                
                doc.setFont('helvetica', 'bold');
                doc.text('Dirección de Entrega/Obra:', margin, yPos);
                doc.setFont('helvetica', 'normal');
                const dirEntregaLines = doc.splitTextToSize(datos.direccionEntrega, contentWidth - 50);
                doc.text(dirEntregaLines, margin + 50, yPos);
                yPos += dirEntregaLines.length * 4 + 5;
                
                // Línea separadora
                doc.line(margin, yPos, pageWidth - margin, yPos);
                yPos += 5;
                
                // ===== SECCIÓN PAGO =====
                doc.setTextColor(...colorPrimary);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(10);
                doc.text('SECCIÓN PAGO', margin, yPos);
                yPos += 7;
                
                doc.setTextColor(...colorText);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                
                doc.setFont('helvetica', 'bold');
                doc.text('Fecha Pago:', margin, yPos);
                doc.setFont('helvetica', 'normal');
                doc.text(formatearFecha(datos.fechaPago), margin + 40, yPos);
                doc.setFont('helvetica', 'bold');
                doc.text('Forma Pago:', margin + 90, yPos);
                doc.setFont('helvetica', 'normal');
                doc.text(datos.formaPago, margin + 130, yPos);
                yPos += 6;
                
                doc.setFont('helvetica', 'bold');
                doc.text('Monto Total:', margin, yPos);
                doc.setFont('helvetica', 'normal');
                doc.text(`$${parseFloat(datos.montoTotal).toLocaleString('es-MX', {minimumFractionDigits:2})}`, margin + 40, yPos);
                doc.setFont('helvetica', 'bold');
                doc.text('Anticipo:', margin + 90, yPos);
                doc.setFont('helvetica', 'normal');
                doc.text(`$${parseFloat(datos.anticipo || 0).toLocaleString('es-MX', {minimumFractionDigits:2})}`, margin + 130, yPos);
                yPos += 8;
                
                // Línea separadora
                doc.line(margin, yPos, pageWidth - margin, yPos);
                yPos += 5;
                
                // ===== ÍTEMS =====
                doc.setTextColor(...colorPrimary);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(10);
                doc.text('ÍTEMS DEL CONTRATO', margin, yPos);
                yPos += 7;
                
                // Headers tabla
                doc.setFillColor(...colorPrimary);
                doc.setTextColor(255, 255, 255);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(8);
                
                doc.rect(margin, yPos - 4, 15, 5, 'F');
                doc.text('Cant', margin + 2, yPos);
                
                doc.rect(margin + 15, yPos - 4, 25, 5, 'F');
                doc.text('Código', margin + 17, yPos);
                
                doc.rect(margin + 40, yPos - 4, 60, 5, 'F');
                doc.text('Descripción', margin + 42, yPos);
                
                doc.rect(margin + 100, yPos - 4, 25, 5, 'F');
                doc.text('Precio/Día', margin + 102, yPos);
                
                doc.rect(margin + 125, yPos - 4, 30, 5, 'F');
                doc.text('Importe', margin + 127, yPos);
                
                yPos += 7;
                
                // Items
                doc.setTextColor(...colorText);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(8);
                
                datos.items.forEach(item => {
                    if (yPos > pageHeight - 30) {
                        doc.addPage();
                        yPos = 20;
                    }
                    
                    doc.text(String(item.cantidad), margin + 2, yPos);
                    doc.text(item.codigo, margin + 17, yPos);
                    doc.text(item.nombre.substring(0, 30), margin + 42, yPos);
                    doc.text(`$${parseFloat(item.precio).toLocaleString('es-MX', {minimumFractionDigits:2})}`, margin + 102, yPos);
                    doc.text(`$${(item.cantidad * item.precio).toLocaleString('es-MX', {minimumFractionDigits:2})}`, margin + 127, yPos);
                    yPos += 5;
                });
                
                if (datos.items.length === 0) {
                    doc.setTextColor(...colorGray);
                    doc.setFont('helvetica', 'italic');
                    doc.text('Sin ítems registrados', margin + 42, yPos);
                    yPos += 5;
                }
                
                // Línea separadora
                yPos += 2;
                doc.line(margin, yPos, pageWidth - margin, yPos);
                yPos += 5;
                
                // ===== TOTALES =====
                const monto = parseFloat(datos.montoTotal) || 0;
                const subtotal = monto / 1.16;
                const iva = monto - subtotal;
                const anticipo = parseFloat(datos.anticipo) || 0;
                const saldo = monto - anticipo;
                
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                
                doc.text('Subtotal:', margin + 100, yPos);
                doc.text(`$${subtotal.toLocaleString('es-MX', {minimumFractionDigits:2})}`, margin + 145, yPos);
                yPos += 5;
                
                doc.text('IVA (16%):', margin + 100, yPos);
                doc.text(`$${iva.toLocaleString('es-MX', {minimumFractionDigits:2})}`, margin + 145, yPos);
                yPos += 5;
                
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(10);
                doc.text('TOTAL:', margin + 100, yPos);
                doc.text(`$${monto.toLocaleString('es-MX', {minimumFractionDigits:2})}`, margin + 145, yPos);
                yPos += 6;
                
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                doc.text('Saldo Pendiente:', margin + 100, yPos);
                doc.text(`$${saldo.toLocaleString('es-MX', {minimumFractionDigits:2})}`, margin + 145, yPos);
                
                // Pie de página
                doc.setTextColor(...colorGray);
                doc.setFont('helvetica', 'italic');
                doc.setFontSize(7);
                const footerY = pageHeight - 10;
                doc.text(`Documento generado: ${new Date().toLocaleDateString('es-MX')} | ICAM 360`, margin, footerY);
                
                // Descargar
                doc.save(`Contrato_${datos.folio}_${new Date().toISOString().split('T')[0]}.pdf`);
                
                document.getElementById('successMsg').classList.add('show');
                setTimeout(() => {
                    document.getElementById('successMsg').classList.remove('show');
                }, 3000);
                
            } catch (error) {
                alert(`❌ Error: ${error.message}`);
                console.error(error);
            }
        }
        
        // Recopilar datos del formulario
        function recopilarDatos() {
            const items = [];
            document.querySelectorAll('#itemsBody tr').forEach(row => {
                const cant = parseFloat(row.querySelector('.cant').value) || 0;
                const codigo = row.querySelector('.codigo').value || '';
                const nombre = row.querySelector('.nombre').value || '';
                const precio = parseFloat(row.querySelector('.precio').value) || 0;
                
                if (cant > 0 && (codigo || nombre)) {
                    items.push({ cantidad: cant, codigo, nombre, precio });
                }
            });
            
            return {
                folio: document.getElementById('folio').value,
                tipoOperacion: document.getElementById('tipoOperacion').value,
                fechaContrato: document.getElementById('fechaContrato').value,
                vendedor: document.getElementById('vendedor').value,

        // Formatear fecha
        function formatearFecha(dateStr) {
            if (!dateStr) return '—';
            const date = new Date(dateStr + 'T12:00:00');
            return date.toLocaleDateString('es-MX', { year: 'numeric', month: '2-digit', day: '2-digit' });
        }
