<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
:root { --primary:#2563eb; --success:#10b981; --danger:#ef4444; --border:#e2e8f0; --bg:#f8fafc; --text:#0f172a; --muted:#94a3b8; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; font-size:13px; color:var(--text); background:var(--bg); }
.header { background:linear-gradient(135deg,#1e3a8a,#2563eb); color:white; padding:20px 16px; }
.header h2 { font-size:16px; font-weight:700; }
.header p { font-size:11px; opacity:0.8; margin-top:4px; }
.form { padding:16px; }
.section { margin-bottom:16px; }
.section-title { font-size:11px; font-weight:700; text-transform:uppercase; color:var(--primary); letter-spacing:0.05em; margin-bottom:10px; padding-bottom:4px; border-bottom:2px solid var(--primary); }
.field { margin-bottom:10px; }
.field label { display:block; font-size:11px; font-weight:600; color:#475569; margin-bottom:3px; }
.field label .req { color:var(--danger); }
.field input, .field select, .field textarea { width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:6px; font-size:12px; background:white; }
.field input:focus, .field select:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 2px rgba(37,99,235,0.15); }
.row { display:grid; gap:8px; }
.row-2 { grid-template-columns:1fr 1fr; }
.row-3 { grid-template-columns:1fr 1fr 1fr; }
.items-section { background:white; border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:16px; }
.items-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.items-header h3 { font-size:13px; font-weight:700; }
.item-row { display:grid; grid-template-columns:60px 1fr 30px; gap:6px; align-items:center; margin-bottom:6px; }
.item-row input, .item-row select { padding:5px 8px; font-size:11px; }
.btn-add { background:var(--primary); color:white; border:none; padding:4px 10px; border-radius:4px; font-size:11px; cursor:pointer; font-weight:600; }
.btn-remove { background:var(--danger); color:white; border:none; width:24px; height:24px; border-radius:4px; cursor:pointer; font-size:14px; line-height:1; }
.footer { padding:16px; border-top:1px solid var(--border); background:white; position:sticky; bottom:0; }
.btn-main { width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; }
.btn-main:hover { background:#1d4ed8; }
.btn-main:disabled { opacity:0.5; cursor:wait; }
.status { text-align:center; margin-top:10px; font-size:12px; padding:8px; border-radius:6px; display:none; }
.status.ok { display:block; background:#d1fae5; color:#065f46; }
.status.err { display:block; background:#fee2e2; color:#991b1b; }
.folio-display { background:white; border:1px solid var(--border); border-radius:8px; padding:8px 12px; text-align:center; margin-bottom:16px; }
.folio-display span { font-size:24px; font-weight:800; color:var(--primary); font-family:monospace; }
</style>
</head>
<body>

<div class="header">
  <h2>📄 Nuevo Contrato</h2>
  <p>Llena los datos y el sistema guardará en Sheets, Supabase y generará el PDF</p>
</div>

<div class="form" id="formArea">
  <!-- Folio -->
  <div class="folio-display">
    <div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600">Folio</div>
    <span id="folioNum">—</span>
  </div>

  <!-- Datos Generales -->
  <div class="section">
    <div class="section-title">Datos Generales</div>
    <div class="row row-2">
      <div class="field"><label>Sucursal <span class="req">*</span></label>
        <select id="sucursal"><option value="">Seleccionar</option><option>Monterrey</option><option>Guadalajara</option><option>CDMX</option><option>Queretaro</option></select></div>
      <div class="field"><label>Tipo <span class="req">*</span></label>
        <select id="tipo_operacion"><option>EN RENTA</option><option>VENTA</option><option>PRESTAMO</option></select></div>
    </div>
    <div class="row row-2">
      <div class="field"><label>Renta Anterior</label><input id="renta_anterior" type="number" placeholder="0"></div>
      <div class="field"><label>Renta Posterior</label><input id="renta_posterior" type="number" placeholder="0"></div>
    </div>
    <div class="field"><label>Sistema</label><input id="sistema" placeholder="Ej: Torres de trabajo"></div>
  </div>

  <!-- Cliente -->
  <div class="section">
    <div class="section-title">Cliente</div>
    <div class="field"><label>Cliente <span class="req">*</span></label>
      <select id="cliente"><option value="">Cargando…</option></select></div>
    <div class="field"><label>Dirección de Proyecto / Obra <span class="req">*</span></label>
      <input id="direccion_proyecto" placeholder="Dirección de la obra"></div>
    <div class="field"><label>Medio de Contacto</label>
      <select id="medio_contacto"><option value="">Seleccionar</option><option>Llamada</option><option>WhatsApp</option><option>Correo</option><option>Referido</option><option>Redes Sociales</option></select></div>
  </div>

  <!-- Logística -->
  <div class="section">
    <div class="section-title">Logística y Fechas</div>
    <div class="row row-2">
      <div class="field"><label>Persona que recibe <span class="req">*</span></label><input id="persona_recibe"></div>
      <div class="field"><label>Tel. quien recibe <span class="req">*</span></label><input id="tel_quien_recibe"></div>
    </div>
    <div class="row row-2">
      <div class="field"><label>¿Requiere flete?</label>
        <select id="requiere_flete"><option>Si</option><option>No</option></select></div>
      <div class="field"><label>Flete a cargo de</label>
        <select id="flete_a_cargo"><option>Cliente</option><option>ICAM</option></select></div>
    </div>
    <div class="row row-3">
      <div class="field"><label>Días renta <span class="req">*</span></label><input id="dias_renta" type="number" value="30"></div>
      <div class="field"><label>Inicio renta <span class="req">*</span></label><input id="inicio_renta" type="date"></div>
      <div class="field"><label>Fin renta</label><input id="fin_renta" type="date" disabled style="background:#f1f5f9"></div>
    </div>
  </div>

  <!-- Pago -->
  <div class="section">
    <div class="section-title">Pago</div>
    <div class="row row-2">
      <div class="field"><label>Forma de pago <span class="req">*</span></label>
        <select id="forma_pago"><option value="">Seleccionar</option><option>Transferencia</option><option>Efectivo</option><option>Cheque</option><option>Tarjeta</option></select></div>
      <div class="field"><label>Fecha de pago <span class="req">*</span></label><input id="fecha_pago" type="date"></div>
    </div>
    <div class="row row-2">
      <div class="field"><label>Factura <span class="req">*</span></label><input id="factura" placeholder="Núm. factura"></div>
      <div class="field"><label>Agente (vendedor) <span class="req">*</span></label><input id="agente" type="number" placeholder="Ej: 1"></div>
    </div>
  </div>

  <!-- Items -->
  <div class="items-section">
    <div class="items-header">
      <h3>📦 Productos</h3>
      <button class="btn-add" onclick="addItem()">+ Agregar</button>
    </div>
    <div id="itemsList"></div>
  </div>

  <!-- Costos Extra -->
  <div class="section">
    <div class="section-title">Costos Adicionales</div>
    <div class="row row-2">
      <div class="field"><label>Depósito</label><input id="deposito" type="number" value="0"></div>
      <div class="field"><label>Subtotal extra</label><input id="subtotal_extra" type="number" value="0"></div>
    </div>
    <div class="row row-2">
      <div class="field"><label>Entrega</label><input id="entrega" type="number" value="0"></div>
      <div class="field"><label>Recolección</label><input id="recoleccion" type="number" value="0"></div>
    </div>
    <div class="row row-3">
      <div class="field"><label>Armado</label><input id="armado" type="number" value="0"></div>
      <div class="field"><label>Otros</label><input id="otros" type="number" value="0"></div>
      <div class="field"><label>IVA</label>
        <select id="iva_porcentaje"><option value="16%">16%</option><option value="0%">0%</option></select></div>
    </div>
    <div class="field"><label>Importe Pagaré <span class="req">*</span></label><input id="pagare" type="number" value="0"></div>
  </div>
</div>

<div class="footer">
  <button class="btn-main" id="btnGuardar" onclick="guardar()">💾 Guardar Contrato</button>
  <div id="status" class="status"></div>
</div>

<script>
let clientes = [];
let productos = [];

// Inicializar
(function init() {
  google.script.run.withSuccessHandler(f => {
    document.getElementById('folioNum').textContent = f;
  }).getNextFolio();

  google.script.run.withSuccessHandler(list => {
    clientes = list;
    const sel = document.getElementById('cliente');
    sel.innerHTML = '<option value="">— Selecciona cliente —</option>' +
      list.map(c => '<option value="'+esc(c)+'">'+esc(c)+'</option>').join('');
  }).getClientes();

  google.script.run.withSuccessHandler(list => {
    productos = list;
    addItem(); // Agregar primera fila
  }).getProductos();

  // Auto-calcular fin de renta
  document.getElementById('dias_renta').addEventListener('input', calcFin);
  document.getElementById('inicio_renta').addEventListener('input', calcFin);

  // Fecha de hoy por defecto
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('inicio_renta').value = hoy;
  document.getElementById('fecha_pago').value = hoy;
  calcFin();
})();

function calcFin() {
  const dias = parseInt(document.getElementById('dias_renta').value) || 0;
  const inicio = document.getElementById('inicio_renta').value;
  if (inicio && dias > 0) {
    const d = new Date(inicio + 'T12:00:00');
    d.setDate(d.getDate() + dias);
    document.getElementById('fin_renta').value = d.toISOString().split('T')[0];
  }
}

function addItem() {
  const list = document.getElementById('itemsList');
  const div = document.createElement('div');
  div.className = 'item-row';
  div.innerHTML =
    '<input type="number" class="item-cant" placeholder="Cant" min="1" value="1">' +
    '<select class="item-prod"><option value="">— Producto —</option>' +
    productos.map(p => '<option value="'+esc(p)+'">'+esc(p)+'</option>').join('') +
    '</select>' +
    '<button class="btn-remove" onclick="this.parentElement.remove()">✕</button>';
  list.appendChild(div);
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function guardar() {
  const btn = document.getElementById('btnGuardar');
  const st = document.getElementById('status');
  st.className = 'status';

  // Validaciones
  const req = [
    ['sucursal','Sucursal'],['cliente','Cliente'],['direccion_proyecto','Dirección de proyecto'],
    ['persona_recibe','Persona que recibe'],['tel_quien_recibe','Teléfono de quien recibe'],
    ['dias_renta','Días de renta'],['inicio_renta','Inicio de renta'],
    ['forma_pago','Forma de pago'],['fecha_pago','Fecha de pago'],
    ['factura','Factura'],['agente','Agente'],
  ];
  for (const [id, name] of req) {
    if (!document.getElementById(id).value) {
      st.textContent = '⚠️ Campo requerido: ' + name;
      st.className = 'status err';
      return;
    }
  }

  // Items
  const items = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const cant = row.querySelector('.item-cant').value;
    const prod = row.querySelector('.item-prod').value;
    if (cant && prod) items.push({ cantidad: Number(cant), producto: prod });
  });
  if (items.length === 0) {
    st.textContent = '⚠️ Agrega al menos un producto';
    st.className = 'status err';
    return;
  }

  const val = id => document.getElementById(id).value;

  const data = {
    numero_contrato: document.getElementById('folioNum').textContent,
    sucursal: val('sucursal'),
    renta_anterior: val('renta_anterior'),
    renta_posterior: val('renta_posterior'),
    tipo_operacion: val('tipo_operacion'),
    cliente: val('cliente'),
    sistema: val('sistema'),
    medio_contacto: val('medio_contacto'),
    direccion_proyecto: val('direccion_proyecto'),
    requiere_flete: val('requiere_flete'),
    flete_a_cargo: val('flete_a_cargo'),
    persona_recibe: val('persona_recibe'),
    tel_quien_recibe: val('tel_quien_recibe'),
    dias_renta: val('dias_renta'),
    inicio_renta: val('inicio_renta'),
    forma_pago: val('forma_pago'),
    fecha_pago: val('fecha_pago'),
    factura: val('factura'),
    agente: val('agente'),
    deposito: val('deposito'),
    subtotal_extra: val('subtotal_extra'),
    entrega: val('entrega'),
    recoleccion: val('recoleccion'),
    armado: val('armado'),
    otros: val('otros'),
    iva_porcentaje: val('iva_porcentaje'),
    pagare: val('pagare'),
    items: items,
  };

  btn.disabled = true;
  btn.textContent = '⏳ Guardando…';
  st.textContent = 'Escribiendo en plantilla, enviando a Supabase, generando PDF…';
  st.className = 'status ok';

  google.script.run
    .withSuccessHandler(result => {
      btn.disabled = false;
      btn.textContent = '💾 Guardar Contrato';
      if (result.ok) {
        st.textContent = '✅ Contrato ' + result.folio + ' guardado. ' +
          'Supabase: ' + (result.supabase ? '✓' : '✗') +
          (result.pdfUrl ? ' | PDF generado' : '');
        st.className = 'status ok';
        document.getElementById('folioNum').textContent = result.nuevoFolio;
        resetForm();
      } else {
        st.textContent = '❌ Error: ' + result.error;
        st.className = 'status err';
      }
    })
    .withFailureHandler(err => {
      btn.disabled = false;
      btn.textContent = '💾 Guardar Contrato';
      st.textContent = '❌ Error: ' + err.message;
      st.className = 'status err';
    })
    .guardarContrato(data);
}

function resetForm() {
  ['renta_anterior','renta_posterior','sistema','direccion_proyecto',
   'persona_recibe','tel_quien_recibe','factura'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('cliente').selectedIndex = 0;
  document.getElementById('deposito').value = 0;
  document.getElementById('subtotal_extra').value = 0;
  document.getElementById('entrega').value = 0;
  document.getElementById('recoleccion').value = 0;
  document.getElementById('armado').value = 0;
  document.getElementById('otros').value = 0;
  document.getElementById('pagare').value = 0;
  document.getElementById('itemsList').innerHTML = '';
  addItem();
}
</script>
</body>
</html>
