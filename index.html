<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICAM — Inventario y Contratos</title>
    <meta name="description" content="Panel de inventarios, entregas y recolecciones de andamios">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
</head>
<body>

<div id="app-shell" style="display: flex;">
    <!-- SIDEBAR -->
    <aside id="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            </div>
            <div>
                <div class="sidebar-logo-text">ICAM Inventarios</div>
                <div class="sidebar-logo-sub">Contratos & Logística</div>
            </div>
        </div>

        <nav>
            <div class="nav-section">
                <a class="nav-item active" data-module="dashboard" id="nav-dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    <span>Dashboard</span>
                </a>
            </div>

            <div class="nav-section">
                <p class="nav-label">Operaciones</p>
                <a class="nav-item" data-module="contratos" id="nav-contratos">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <span>Contratos</span>
                </a>
            </div>

            <div class="nav-section">
                <p class="nav-label">Logística</p>
                <a class="nav-item" data-module="hs" id="nav-hs">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                    <span>Hojas de Salida</span>
                </a>
                <a class="nav-item" data-module="he" id="nav-he">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                    <span>Hojas de Entrada</span>
                </a>
            </div>

            <div class="nav-section">
                <p class="nav-label">Almacén</p>
                <a class="nav-item" data-module="inventario" id="nav-inventario">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
                    <span>Inventario</span>
                </a>
                <a class="nav-item" data-module="estado_cuenta" id="nav-estado-cuenta">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 6-8"/></svg>
                    <span>Estado de Cuenta</span>
                </a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="nav-item" style="padding: 0.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <div style="flex: 1; overflow: hidden;">
                    <div style="font-size:0.8rem;color:white;font-weight:600;">Operador</div>
                    <div style="font-size:0.65rem;color:var(--sidebar-text)">Inventarios</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- ÁREA PRINCIPAL -->
    <main id="main-area">
        <header id="app-header">
            <div>
                <div class="header-title" id="header-title">Dashboard</div>
                <div class="header-breadcrumb" id="header-breadcrumb">ICAM / Dashboard</div>
            </div>
            <div class="header-actions">
                <span class="badge badge-success" id="conn-badge">● Conectado</span>
            </div>
        </header>
        <div id="module-content">
            <div class="loading-center"><div class="spinner"></div><span>Cargando…</span></div>
        </div>
    </main>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script>
window.addEventListener('error', function(e) { console.error('❌', e.message, e.filename + ':' + e.lineno); });
window.addEventListener('unhandledrejection', function(e) { console.error('❌ Promise:', e.reason); });
</script>

<script type="module" src="js/main.js"></script>

</body>
</html>
