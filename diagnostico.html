<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICAM 360 — Diagnóstico de Carga</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #00ffff; margin-bottom: 20px; }
        .log { 
            background: #0a0a0a;
            border: 1px solid #00ff00;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 600px;
            overflow-y: auto;
        }
        .log-item {
            padding: 5px 0;
            border-bottom: 1px solid #00330000;
        }
        .log-item.error { color: #ff3333; }
        .log-item.success { color: #33ff33; }
        .log-item.info { color: #3333ff; }
        .log-item.warn { color: #ffaa00; }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
        }
        button:hover { background: #00cc00; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 ICAM 360 — Diagnóstico de Carga</h1>
    
    <div>
        <button onclick="testImports()">Test Importaciones</button>
        <button onclick="testSupabase()">Test Supabase</button>
        <button onclick="testAuth()">Test Auth</button>
        <button onclick="clearLog()">Limpiar Log</button>
    </div>

    <div class="log" id="log">
        <div class="log-item info">🔍 Sistema de diagnóstico iniciado...</div>
    </div>
</div>

<script>
const logElement = document.getElementById('log');

function addLog(message, type = 'info') {
    const item = document.createElement('div');
    item.className = `log-item ${type}`;
    
    const timestamp = new Date().toLocaleTimeString();
    const icon = {
        'error': '❌',
        'success': '✅',
        'info': 'ℹ️',
        'warn': '⚠️'
    }[type] || '📍';
    
    item.textContent = `[${timestamp}] ${icon} ${message}`;
    logElement.appendChild(item);
    logElement.scrollTop = logElement.scrollHeight;
    console.log(`[${type}] ${message}`);
}

// Test 1: Importaciones básicas
async function testImports() {
    addLog('Iniciando prueba de importaciones...', 'info');
    
    try {
        addLog('Importando Auth...', 'info');
        const auth = await import('./js/auth.js');
        addLog('✓ Auth importado correctamente', 'success');
        
        addLog('Importando Supabase Client...', 'info');
        const supabase = await import('./js/supabase-client.js');
        addLog('✓ Supabase Client importado correctamente', 'success');
        addLog(`  - DEMO_MODE: ${supabase.DEMO_MODE}`, 'info');
        
        addLog('Importando Utilidades...', 'info');
        const utils = await import('./js/utils.js');
        addLog('✓ Utilidades importadas correctamente', 'success');
        
        addLog('Todos los módulos cargados exitosamente', 'success');
    } catch (e) {
        addLog(`ERROR en importaciones: ${e.message}`, 'error');
        addLog(`Stack: ${e.stack}`, 'error');
    }
}

// Test 2: Supabase
async function testSupabase() {
    addLog('Iniciando prueba de Supabase...', 'info');
    
    try {
        const { _supabase, DEMO_MODE, SUPABASE_URL } = await import('./js/supabase-client.js');
        
        addLog(`DEMO_MODE: ${DEMO_MODE}`, 'info');
        addLog(`SUPABASE_URL: ${SUPABASE_URL}`, 'info');
        addLog(`_supabase disponible: ${!!_supabase}`, 'info');
        
        if (DEMO_MODE) {
            addLog('Usando Modo Demo - OK', 'success');
        } else if (_supabase) {
            addLog('Supabase conectado - OK', 'success');
        } else {
            addLog('ADVERTENCIA: Ni Demo ni Supabase disponible', 'warn');
        }
    } catch (e) {
        addLog(`ERROR en Supabase: ${e.message}`, 'error');
        addLog(`Stack: ${e.stack}`, 'error');
    }
}

// Test 3: Auth
async function testAuth() {
    addLog('Iniciando prueba de Auth...', 'info');
    
    try {
        const { Auth } = await import('./js/auth.js');
        addLog('Auth módulo importado', 'info');
        
        // Inicializar Auth
        const isLoggedIn = await Auth.init();
        addLog(`Auth.init() resultado: ${isLoggedIn}`, 'info');
        
        const user = Auth.getUser();
        addLog(`Usuario actual: ${user ? user.email || 'Sin email' : 'Ninguno'}`, 'info');
        
        addLog('Auth funciona correctamente', 'success');
    } catch (e) {
        addLog(`ERROR en Auth: ${e.message}`, 'error');
        addLog(`Stack: ${e.stack}`, 'error');
    }
}

function clearLog() {
    logElement.innerHTML = '<div class="log-item info">📋 Log limpiado</div>';
}

// Auto-test al cargar
window.addEventListener('load', () => {
    addLog('Página cargada completamente', 'success');
    addLog('Haz click en los botones para probar cada componente', 'info');
});

// Capturar errores globales
window.addEventListener('error', (e) => {
    addLog(`GLOBAL ERROR: ${e.message} @ ${e.filename}:${e.lineno}`, 'error');
});

window.addEventListener('unhandledrejection', (e) => {
    addLog(`UNHANDLED REJECTION: ${e.reason}`, 'error');
});
</script>

</body>
</html>
